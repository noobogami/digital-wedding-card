# Nginx Reverse Proxy Configuration for Docker Container
# Place this file in /etc/nginx/sites-available/ and symlink to /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;

    # change following line to your domain
    server_name YOUR-SITE.COME www.YOUR-SITE.COM;

    # Logging
    access_log /var/log/nginx/wedding-card-access.log;
    error_log /var/log/nginx/wedding-card-error.log;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Proxy to Docker container
    location / {
        proxy_pass http://localhost:5989;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support (if needed)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

